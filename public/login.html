<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Josify — ログイン</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-mark { font-size: 32px; }
    .logo-text {
      display: block;
      font-size: 28px;
      font-weight: 800;
      color: #1a1a2e;
      letter-spacing: 2px;
      margin-top: 8px;
    }
    .logo-tagline {
      display: block;
      font-size: 12px;
      color: #6B7280;
      margin-top: 4px;
    }
    h2 {
      font-size: 18px;
      color: #1a1a2e;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      font-size: 13px;
      color: #6B7280;
      text-align: center;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="email"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }
    input[type="email"]:focus { border-color: #f97316; }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .error {
      background: #FEF2F2;
      color: #DC2626;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .note {
      font-size: 12px;
      color: #9CA3AF;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <span class="logo-mark">⚡</span>
      <span class="logo-text">Josify</span>
      <span class="logo-tagline">補助金・助成金 申請サポートAI</span>
    </div>
    <h2>ログイン</h2>
    <p class="subtitle">登録済みのメールアドレスを入力してください</p>
    <div class="error" id="error-msg"></div>
    <form id="login-form">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" placeholder="example@company.com" required autofocus>
      <button type="submit" class="btn">ログイン →</button>
    </form>
    <p class="note">ご利用にはLIDEAとのご契約が必要です</p>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const errorEl = document.getElementById('error-msg');
      errorEl.style.display = 'none';

      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });

      if (res.ok) {
        window.location.href = '/';
      } else {
        const data = await res.json();
        errorEl.textContent = data.error || 'ログインに失敗しました';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
